openapi: 3.1.0
info:
  title: Egrysa Gateway API
  version: 0.1.0
  description: OpenAI-compatible text, streaming, and function-tool AI egress control boundary.
servers:
  - url: http://127.0.0.1:8787
security:
  - bearerAuth: []
paths:
  /healthz:
    get:
      security: []
      operationId: health
      responses:
        "200": { description: Process is alive }
  /readyz:
    get:
      security: []
      operationId: ready
      responses:
        "200": { description: Configuration loaded }
  /metrics:
    get:
      operationId: metrics
      responses:
        "200":
          description: Content-free Prometheus metrics
          content:
            text/plain: { schema: { type: string } }
  /v1/models:
    get:
      operationId: listModels
      responses:
        "200":
          description: OpenAI-compatible union of configured model allowlists
          content:
            application/json: { schema: { type: object } }
  /v1/chat/completions:
    post:
      operationId: createChatCompletion
      parameters:
        - in: header
          name: x-egrysa-provider
          required: false
          schema: { type: string }
          description: Requested configured provider. Policy can override it.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ChatRequest" }
      responses:
        "200":
          description: OpenAI-compatible JSON or SSE streaming response
          headers:
            x-egrysa-decision: { schema: { enum: [allow_raw, transform, local_only] } }
            x-egrysa-receipt: { schema: { type: string, format: uuid } }
          content:
            application/json: { schema: { type: object } }
            text/event-stream: { schema: { type: string } }
        "401": { $ref: "#/components/responses/Problem" }
        "403": { $ref: "#/components/responses/Problem" }
        "413": { $ref: "#/components/responses/Problem" }
        "422": { $ref: "#/components/responses/Problem" }
        "502": { $ref: "#/components/responses/Problem" }
  /v1/receipts/{id}:
    get:
      operationId: getReceipt
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Content-minimized signed policy receipt
          content:
            application/json: { schema: { $ref: "#/components/schemas/Receipt" } }
        "404": { $ref: "#/components/responses/Problem" }
  /v1/receipts/public-key:
    get:
      operationId: getReceiptPublicKey
      responses:
        "200": { description: Ed25519 SPKI public verification key }
  /v1/receipts/checkpoint:
    get:
      operationId: getReceiptCheckpoint
      responses:
        "200": { description: Signed receipt-chain head for external anchoring }
components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer }
  responses:
    Problem:
      description: RFC 9457-style problem response
      content:
        application/json: { schema: { $ref: "#/components/schemas/Problem" } }
  schemas:
    ChatRequest:
      type: object
      additionalProperties: false
      required: [model, messages]
      properties:
        model: { type: string }
        messages:
          type: array
          minItems: 1
          maxItems: 256
          items:
            type: object
            additionalProperties: false
            required: [role, content]
            properties:
              role: { enum: [system, user, assistant, tool] }
              content: { type: [string, "null"] }
              name: { type: string }
              tool_call_id: { type: string }
              tool_calls: { type: array, items: { $ref: "#/components/schemas/ToolCall" } }
        stream: { type: boolean, default: false }
        stream_options:
          type: object
          additionalProperties: false
          properties:
            include_usage: { type: boolean }
        tools:
          type: array
          minItems: 1
          maxItems: 128
          items: { $ref: "#/components/schemas/Tool" }
        tool_choice: {}
        parallel_tool_calls: { type: boolean }
        temperature: { type: number, minimum: 0, maximum: 2 }
        max_tokens: { type: integer, minimum: 1, maximum: 1000000 }
        top_p: { type: number, minimum: 0, maximum: 1 }
        frequency_penalty: { type: number, minimum: -2, maximum: 2 }
        presence_penalty: { type: number, minimum: -2, maximum: 2 }
        seed: { type: integer }
    ToolCall:
      type: object
      required: [id, type, function]
      properties:
        id: { type: string }
        type: { const: function }
        function:
          type: object
          required: [name, arguments]
          properties:
            name: { type: string }
            arguments: { type: string, description: JSON object encoded as a string }
    Tool:
      type: object
      required: [type, function]
      properties:
        type: { const: function }
        function:
          type: object
          required: [name]
          properties:
            name: { type: string }
            description: { type: string }
            parameters: { type: object }
            strict: { type: boolean }
    Receipt:
      type: object
      required: [
        version,
        id,
        chainId,
        sequence,
        timestamp,
        workloadId,
        requestFingerprint,
        decision,
        model,
        findingCounts,
        transformedFields,
        rawContentPersisted,
        providerStoreRequested,
        receiptHash,
        signingKeyId,
        signature,
      ]
      properties:
        version: { const: "2" }
        id: { type: string, format: uuid }
        chainId: { type: string }
        sequence: { type: integer, minimum: 1 }
        timestamp: { type: string, format: date-time }
        workloadId: { type: string }
        requestFingerprint: { type: string, pattern: "^[a-f0-9]{64}$" }
        decision: { enum: [allow_raw, transform, local_only, deny] }
        provider: { type: [string, "null"] }
        model: { type: string }
        findingCounts: { type: object, additionalProperties: { type: integer, minimum: 0 } }
        transformedFields: { type: integer, minimum: 0 }
        rawContentPersisted: { const: false }
        providerStoreRequested: { const: false }
        previousReceiptHash: { type: [string, "null"] }
        receiptHash: { type: string, pattern: "^[a-f0-9]{64}$" }
        signingKeyId: { type: string }
        signature: { type: string, contentEncoding: base64 }
    Problem:
      type: object
      required: [type, title, status, detail]
      properties:
        type: { type: string, format: uri }
        title: { type: string }
        status: { type: integer }
        detail: { type: string }
        receiptId: { type: string, format: uuid }
