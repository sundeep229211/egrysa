openapi: 3.1.0
info:
  title: SovereignLoop Gateway API
  version: 0.1.0
  description: Text-only, OpenAI-compatible enterprise AI egress control boundary.
servers:
  - url: http://127.0.0.1:8787
security:
  - bearerAuth: []
paths:
  /healthz:
    get:
      security: []
      operationId: health
      responses:
        "200": { description: Process is alive }
  /readyz:
    get:
      security: []
      operationId: ready
      responses:
        "200": { description: Configuration loaded }
  /metrics:
    get:
      security: []
      operationId: metrics
      responses:
        "200":
          description: Content-free Prometheus metrics
          content:
            text/plain: { schema: { type: string } }
  /v1/chat/completions:
    post:
      operationId: createChatCompletion
      parameters:
        - in: header
          name: x-sovereignloop-provider
          required: false
          schema: { type: string }
          description: Requested configured provider. Policy can override it.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ChatRequest" }
      responses:
        "200":
          description: OpenAI-compatible non-streaming response
          headers:
            x-sovereignloop-decision: { schema: { enum: [allow_raw, transform, local_only] } }
            x-sovereignloop-receipt: { schema: { type: string, format: uuid } }
          content:
            application/json: { schema: { type: object } }
        "401": { $ref: "#/components/responses/Problem" }
        "403": { $ref: "#/components/responses/Problem" }
        "413": { $ref: "#/components/responses/Problem" }
        "422": { $ref: "#/components/responses/Problem" }
        "502": { $ref: "#/components/responses/Problem" }
  /v1/receipts/{id}:
    get:
      operationId: getReceipt
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Content-free privacy receipt
          content:
            application/json: { schema: { $ref: "#/components/schemas/Receipt" } }
        "404": { $ref: "#/components/responses/Problem" }
components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer }
  responses:
    Problem:
      description: RFC 9457-style problem response
      content:
        application/json: { schema: { $ref: "#/components/schemas/Problem" } }
  schemas:
    ChatRequest:
      type: object
      additionalProperties: true
      required: [model, messages]
      properties:
        model: { type: string }
        messages:
          type: array
          minItems: 1
          maxItems: 256
          items:
            type: object
            additionalProperties: false
            required: [role, content]
            properties:
              role: { enum: [system, user, assistant] }
              content: { type: string }
        stream: { const: false, default: false }
        tools: { not: {} }
        tool_choice: { not: {} }
        temperature: { type: number }
        max_tokens: { type: integer, minimum: 1 }
    Receipt:
      type: object
      required: [
        version,
        id,
        timestamp,
        requestHash,
        decision,
        model,
        findingCounts,
        transformedFields,
        rawContentPersisted,
        providerStoreRequested,
        receiptHash,
        signature,
      ]
      properties:
        version: { const: "1" }
        id: { type: string, format: uuid }
        timestamp: { type: string, format: date-time }
        requestHash: { type: string, pattern: "^[a-f0-9]{64}$" }
        decision: { enum: [allow_raw, transform, local_only, deny] }
        provider: { type: [string, "null"] }
        model: { type: string }
        findingCounts: { type: object, additionalProperties: { type: integer, minimum: 0 } }
        transformedFields: { type: integer, minimum: 0 }
        rawContentPersisted: { const: false }
        providerStoreRequested: { const: false }
        previousReceiptHash: { type: [string, "null"] }
        receiptHash: { type: string, pattern: "^[a-f0-9]{64}$" }
        signature: { type: string, pattern: "^[a-f0-9]{64}$" }
    Problem:
      type: object
      required: [type, title, status, detail]
      properties:
        type: { type: string, format: uri }
        title: { type: string }
        status: { type: integer }
        detail: { type: string }
        receiptId: { type: string, format: uuid }
