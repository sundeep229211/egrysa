name: Release image
on:
  push:
    tags: ["v*"]
permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write
jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with: { fetch-depth: 0 }
      - name: Require the release commit on main
        run: |
          git fetch origin main --no-tags
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main
      - uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed # v2.0.5
        with: { deno-version: "2.9.2" }
      - run: deno task check
      - run: deno task eval
      - run: deno audit
  image:
    needs: verify
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set immutable release tag
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}:${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: Containerfile
          load: true
          tags: ${{ env.IMAGE }}
      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          scanners: vuln
      - name: Generate CycloneDX SBOM from the scanned image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}
          format: cyclonedx
          output: sbom.cdx.json
          scanners: vuln
      - name: Push the exact image that passed scanning
        id: push
        run: |
          docker push "$IMAGE"
          REFERENCE="$(docker inspect --format='{{index .RepoDigests 0}}' "$IMAGE")"
          DIGEST="${REFERENCE##*@}"
          test -n "$DIGEST"
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "reference=$REFERENCE" >> "$GITHUB_OUTPUT"
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Attest SBOM and sign image by immutable digest
        env:
          REFERENCE: ${{ steps.push.outputs.reference }}
        run: |
          cosign attest --yes --predicate sbom.cdx.json --type cyclonedx "$REFERENCE"
          cosign sign --yes "$REFERENCE"
      - uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
