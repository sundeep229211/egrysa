name: Bug report
description: Report reproducible behavior using synthetic data only.
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not submit vulnerabilities, credentials, prompts, responses, or customer data. Use private vulnerability reporting for security issues.
  - type: textarea
    id: behavior
    attributes: {
      label: Observed behavior,
      description: Describe the problem without sensitive data.,
    }
    validations: { required: true }
  - type: textarea
    id: expected
    attributes: { label: Expected behavior }
    validations: { required: true }
  - type: input
    id: version
    attributes: { label: Version or commit }
    validations: { required: true }
  - type: textarea
    id: reproduction
    attributes: { label: Synthetic reproduction, description: Provide the smallest safe example. }
    validations: { required: true }
