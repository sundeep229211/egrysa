apiVersion: v1
kind: ConfigMap
metadata:
  name: sovereignloop-config
  labels:
    app.kubernetes.io/name: sovereignloop
data:
  sovereignloop.json: |
    {
      "listen": { "hostname": "0.0.0.0", "port": 8787 },
      "maxRequestBytes": 1048576,
      "requestTimeoutMs": 60000,
      "receiptCapacity": 10000,
      "providers": [
        {
          "id": "openai",
          "kind": "openai",
          "baseUrl": "https://api.openai.com",
          "apiKeyEnv": "OPENAI_API_KEY",
          "allowedModels": ["gpt-5.6-luna"],
          "dataPolicy": { "training": "disabled", "retention": "standard", "allowRaw": false }
        }
      ],
      "policy": {
        "defaultProvider": "openai",
        "localProvider": "openai",
        "blockKinds": ["credit_card", "private_key", "api_secret", "ssn"],
        "localOnlyKinds": ["confidential_term"],
        "transformKinds": ["email", "phone", "ipv4", "iban"],
        "sensitiveTerms": [{ "term": "REPLACE BEFORE DEPLOYMENT", "label": "confidential" }]
      }
    }
